name: Build iOS IPA With iPhone Widget

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcodeproj
        run: |
          sudo gem install xcodeproj

      - name: Remove Watch targets and references
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'Nezha Mobile.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          watch_names = [
            'Nezha Watch',
            'Nezha Watch Widget'
          ]

          puts "Removing Watch targets from dependencies..."
          project.targets.each do |target|
            target.dependencies.dup.each do |dep|
              dep_name = dep.target&.name.to_s
              if watch_names.include?(dep_name)
                puts "Removing dependency #{dep_name} from #{target.name}"
                dep.remove_from_project
              end
            end
          end

          puts "Removing Watch files from build phases..."
          project.targets.each do |target|
            target.build_phases.each do |phase|
              next unless phase.respond_to?(:files)

              phase.files.dup.each do |build_file|
                display_name = build_file.display_name.to_s
                file_ref_name = build_file.file_ref&.display_name.to_s
                file_path = build_file.file_ref&.path.to_s

                hit = watch_names.any? do |n|
                  display_name.include?(n) ||
                  file_ref_name.include?(n) ||
                  file_path.include?(n)
                end

                if hit
                  puts "Removing build file #{display_name} from #{target.name}"
                  phase.remove_build_file(build_file)
                end
              end
            end
          end

          puts "Removing Watch targets..."
          project.targets.dup.each do |target|
            if watch_names.include?(target.name)
              puts "Removing target: #{target.name}"
              target.remove_from_project
            end
          end

          project.save
          RUBY

      - name: Remove Watch targets from scheme
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          scheme_path = 'Nezha Mobile.xcodeproj/xcshareddata/xcschemes/Nezha Mobile.xcscheme'

          if File.exist?(scheme_path)
            scheme = Xcodeproj::XCScheme.new(scheme_path)

            watch_names = [
              'Nezha Watch',
              'Nezha Watch Widget'
            ]

            scheme.build_action.entries.delete_if do |entry|
              target_name = entry.buildable_references.first&.target_name.to_s
              if watch_names.include?(target_name)
                puts "Removing from scheme build: #{target_name}"
                true
              else
                false
              end
            end

            scheme.save!
          else
            puts "Scheme not found, skipping scheme patch."
          end
          RUBY

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -derivedDataPath build

      - name: Show Schemes and Targets
        run: |
          xcodebuild -list -project "Nezha Mobile.xcodeproj"

      - name: Build iOS App
        run: |
          set +e

          xcodebuild \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            build | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          echo "xcodebuild exit code: $BUILD_EXIT"

          APP_PATH=$(find build -path "*/Build/Products/Release-iphoneos/Nezha Mobile.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Nezha Mobile.app was not generated, real build failure."
            exit $BUILD_EXIT
          fi

          echo "Nezha Mobile.app exists, continue packaging."
          exit 0

      - name: Locate Products
        if: always()
        run: |
          if [ -d build ]; then
            find build -name "*.app" -o -name "*.appex"
          else
            echo "No build directory"
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find build -path "*/Build/Products/Release-iphoneos/Nezha Mobile.app" | head -n 1)

          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "App not found!"
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r Nezha-Mobile-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nezha-Mobile-unsigned-ipa
          path: Nezha-Mobile-unsigned.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
