name: Build Nezha Mobile IPA (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcodeproj gem
        run: sudo gem install xcodeproj --no-document

      # 从 scheme 里彻底移除 Watch / Vision / Desktop 相关 target
      - name: Remove Non-iOS Targets from Scheme
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          scheme_path = 'Nezha Mobile.xcodeproj/xcshareddata/xcschemes/Nezha Mobile.xcscheme'
          unless File.exist?(scheme_path)
            puts "ERROR: Scheme not found at #{scheme_path}"
            exit 1
          end

          scheme = Xcodeproj::XCScheme.new(scheme_path)

          # 排除所有非 iPhone/iPad target
          exclude_targets = [
            'Nezha Watch',
            'Nezha Watch Widget',
            'Nezha Vision',
            'Nezha Desktop',
          ]

          scheme.build_action.entries.delete_if do |entry|
            name = entry.buildable_references.first&.target_name
            if exclude_targets.include?(name)
              puts "Removing: #{name}"
              true
            else
              puts "Keeping:  #{name}"
              false
            end
          end

          scheme.save!
          puts "Done."
          RUBY

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -derivedDataPath build

      - name: List Schemes and Targets
        run: xcodebuild -list -project "Nezha Mobile.xcodeproj"

      # 编译时额外用 EXCLUDED_SOURCE_FILE_NAMES 跳过 Watch target 的源码
      # 并且显式禁用签名
      - name: Build App (No Code Signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            WATCHOS_DEPLOYMENT_TARGET="" \
            build 2>&1 | tee build.log

      - name: Locate Built App
        if: always()
        run: |
          echo "=== .app files ==="
          find build/Build/Products -name "*.app" -maxdepth 3 2>/dev/null || true

      - name: Package IPA
        run: |
          APP_PATH=$(find build -path "*/Build/Products/Release-iphoneos/Nezha Mobile.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Nezha Mobile.app not found!"
            find build -name "*.app" -not -path "*/Intermediates/*" 2>/dev/null || true
            exit 1
          fi

          echo "Packaging: $APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Nezha-Mobile-unsigned.ipa Payload/
          echo "Done: $(du -sh Nezha-Mobile-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nezha-Mobile-unsigned-ipa
          path: Nezha-Mobile-unsigned.ipa
          retention-days: 7

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
