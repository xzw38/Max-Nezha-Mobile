name: Build iOS IPA Only

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcodeproj
        run: |
          sudo gem install xcodeproj

      - name: Remove Watch Targets
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'Nezha Mobile.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          remove_names = [
            'Nezha Watch',
            'Nezha Watch Widget'
          ]

          project.targets.each do |target|
            if remove_names.include?(target.name)
              puts "Removing target: #{target.name}"
              target.remove_from_project
            end
          end

          project.save
          RUBY

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "Nezha Mobile.xcodeproj"

      - name: Show Targets
        run: |
          xcodebuild -list -project "Nezha Mobile.xcodeproj"

      - name: Build iOS App
        run: |
          set -o pipefail

          xcodebuild \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            build | tee build.log

      - name: Locate App
        run: |
          find build -name "*.app"

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "Nezha Mobile.app" | head -n 1)

          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "App not found!"
            exit 1
          fi

          mkdir Payload
          cp -R "$APP_PATH" Payload/

          zip -r Nezha-Mobile-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nezha-Mobile-unsigned-ipa
          path: Nezha-Mobile-unsigned.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
