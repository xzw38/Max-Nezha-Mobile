name: Build iOS IPA With iPhone Widget

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcodeproj
        run: |
          sudo gem install xcodeproj

      - name: Remove Watch targets from scheme only
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          scheme_path = 'Nezha Mobile.xcodeproj/xcshareddata/xcschemes/Nezha Mobile.xcscheme'

          unless File.exist?(scheme_path)
            puts "Scheme not found at #{scheme_path}"
            exit 1
          end

          scheme = Xcodeproj::XCScheme.new(scheme_path)

          watch_names = [
            'Nezha Watch',
            'Nezha Watch Widget'
          ]

          scheme.build_action.entries.delete_if do |entry|
            target_name = entry.buildable_references.first&.target_name
            if watch_names.include?(target_name)
              puts "Removing from scheme build: #{target_name}"
              true
            else
              false
            end
          end

          scheme.save!
          RUBY

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -derivedDataPath build

      - name: Show Schemes and Targets
        run: |
          xcodebuild -list -project "Nezha Mobile.xcodeproj"

      - name: Build iOS App
        run: |
          set -o pipefail

          xcodebuild \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            build | tee build.log

      - name: Locate App
        if: always()
        run: |
          find build -name "*.app" -o -name "*.appex"

      - name: Package IPA
        run: |
          APP_PATH=$(find build -path "*/Build/Products/Release-iphoneos/Nezha Mobile.app" | head -n 1)

          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "App not found!"
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r Nezha-Mobile-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nezha-Mobile-unsigned-ipa
          path: Nezha-Mobile-unsigned.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
