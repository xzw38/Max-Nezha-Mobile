name: Build Unsigned IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Nezha Mobile.xcodeproj"

      - name: Show schemes and targets
        run: |
          xcodebuild -list -project "Nezha Mobile.xcodeproj"

      - name: Build iOS app
        run: |
          xcodebuild \
            -project "Nezha Mobile.xcodeproj" \
            -scheme "Nezha Mobile" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find build -path "*/Build/Products/Release-iphoneos/*.app" -name "Nezha Mobile.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Nezha-Mobile-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nezha-Mobile-unsigned-ipa
          path: Nezha-Mobile-unsigned.ipa
