name: Build Unsigned IPA

on:
  workflow_dispatch: # 支持你在 GitHub Actions 页面手动点击运行

jobs:
  build:
    runs-on: macos-26  # 使用最新的 macos-26 环境

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode Version
        run: |
          # 确保切换到当前的最新正式版 Xcode 26
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build and Archive for iOS
        run: |
          # 因为是多平台项目，这里显式指定 target 平台为 iOS，并跳过签名限制
          xcodebuild archive \
            -workspace "Nezha Mobile.xcworkspace" \
            -scheme "Nezha Mobile" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath build/NezhaMobile.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package App to IPA
        run: |
          # 创建标准的 IPA 包结构 Payload 目录
          mkdir -p build/Payload
          
          # 将编译生成的 .app 复制到 Payload 文件夹中
          cp -r build/NezhaMobile.xcarchive/Products/Applications/*.app build/Payload/
          
          # 打包为 ipa 格式
          cd build
          zip -r Nezha-Mobile-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nezha-Mobile-Unsigned-IPA
          path: build/Nezha-Mobile-Unsigned.ipa
